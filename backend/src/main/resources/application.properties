# Server Configuration
server.port=8080
spring.application.name=online-exam-platform

# Database Connection (Environment variables used by Elastic Beanstalk)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate Settings
spring.jpa.show-sql=false
# 'update' is perfect for testing; it creates tables automatically for your 15,000 students
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hikari Connection Pool (Optimized for RDS t3.micro/t4g.micro)
# Connection timeout: 20 seconds
spring.datasource.hikari.connection-timeout=20000
# Maximum pool size: 5 (Keeps your RDS from running out of memory)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Handling Large Data (Useful for 15,000 records)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true