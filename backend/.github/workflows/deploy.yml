name: Deploy Online Exam Backend

on:
  push:
    branches: [ "main" ]
    # Only trigger if changes happen in the backend folder
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # This tells EVERY step to run inside the backend folder
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Rename the JAR so the Dockerfile inside /backend can find it
      - name: Prepare JAR for Docker
        run: cp target/*.jar first.jar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: online-exam-backend
        run: |
          # The "." here now refers to the /backend folder
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Manifest & Zip
        run: |
          sed -i "s|<IMAGE_NAME>|719674478824.dkr.ecr.ap-south-2.amazonaws.com/online-exam-backend:latest|g" Dockerrun.aws.json
          zip deploy.zip Dockerrun.aws.json

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: online-exam-platform
          environment_name: online-exam-env
          version_label: "v-${{ github.sha }}"
          region: ${{ secrets.AWS_REGION }}
          # Path to the zip inside the backend folder
          deployment_package: backend/deploy.zip